project:
  type: website
  output-dir: docs
  resources:
    - llms.txt
    - sitemap.xml
    - robots.txt
    - google381cf6834b4474db.html
    - Research/*_llms.txt

website:
  title: "Fabien Candau"
  navbar: false

format:
  html:
    theme: none
    css: custom.css
    toc: false
    minimal: true
    link-external-newwindow: true
    include-before-body:
      text: |
        <header id="site-header">
          <h1>Fabien Candau</h1>
          <nav>
            <ul>
              <li><a data-page="index.html">Home</a></li>
              <li><a data-page="publication.html">Publications</a></li>
              <li><a data-page="media.html">Media</a></li>
              <li><a data-page="course.html">Courses</a></li>
            </ul>
          </nav>
        </header>
    include-after-body:
      text: |
        <footer>
          <p>© 2025 Fabien Candau</p>
        </footer>
        <script>
          (function() {
            var path = window.location.pathname;
            var siteRoot = '/Homepage/';
            var links = document.querySelectorAll('header nav a[data-page]');
            links.forEach(function(link) {
              var page = link.getAttribute('data-page');
              link.href = siteRoot + page;
              if (path.endsWith('/' + page) || (page === 'index.html' && (path === siteRoot || path === siteRoot + 'index.html'))) {
                link.classList.add('active');
              }
              if (path.includes('/Media/') && page === 'media.html') {
                link.classList.add('active');
              }
            });
          })();
        </script>
